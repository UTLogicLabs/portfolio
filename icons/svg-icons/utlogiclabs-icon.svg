<svg width="120" height="120" viewBox="0 0 120 120" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>UTLogicLabs icon</title>
  <desc>Circuit-board node mark for UTLogicLabs</desc>

  <style>
    .mark-bg { fill: #0d1117; }
    .trace { stroke: #3b82f6; stroke-width: 1.5; fill: none; }
    .trace-dim { stroke: #1a2a4a; stroke-width: 1; fill: none; }
    .node-outer { fill: #0d1117; stroke: #3b82f6; stroke-width: 1.5; }
    .node-inner { fill: #3b82f6; }
    .node-dim { fill: #1a2a4a; }
  </style>

  <rect x="0" y="0" width="120" height="120" rx="8" class="mark-bg" stroke="#1a2a4a" stroke-width="1"/>

  <!-- Dim traces -->
  <line x1="20" y1="20" x2="20" y2="40" class="trace-dim"/>
  <line x1="20" y1="40" x2="40" y2="40" class="trace-dim"/>
  <line x1="100" y1="100" x2="100" y2="80" class="trace-dim"/>
  <line x1="100" y1="80" x2="80" y2="80" class="trace-dim"/>
  <line x1="60" y1="20" x2="60" y2="0" class="trace-dim" stroke-dasharray="3 3"/>
  <line x1="100" y1="40" x2="120" y2="40" class="trace-dim" stroke-dasharray="3 3"/>

  <!-- Active traces -->
  <polyline points="20,30 20,60 40,60" class="trace"/>
  <polyline points="60,30 60,60" class="trace"/>
  <polyline points="60,60 80,60 80,90 100,90" class="trace"/>
  <polyline points="100,30 100,60 80,60" class="trace"/>
  <polyline points="20,90 40,90 40,60" class="trace"/>
  <polyline points="40,90 60,90 60,60" class="trace"/>

  <!-- Dim nodes -->
  <circle cx="20" cy="20" r="4" class="node-dim"/>
  <circle cx="100" cy="100" r="4" class="node-dim"/>

  <!-- Active nodes -->
  <circle cx="20" cy="30" r="5" class="node-outer"/>
  <circle cx="20" cy="30" r="2.5" class="node-inner"/>

  <circle cx="60" cy="30" r="5" class="node-outer"/>
  <circle cx="60" cy="30" r="2.5" class="node-inner"/>

  <circle cx="100" cy="30" r="5" class="node-outer"/>
  <circle cx="100" cy="30" r="2.5" class="node-inner"/>

  <circle cx="40" cy="60" r="4" class="node-outer"/>
  <circle cx="40" cy="60" r="2" class="node-inner"/>

  <circle cx="60" cy="60" r="6" class="node-outer" stroke-width="2"/>
  <circle cx="60" cy="60" r="3" class="node-inner"/>

  <circle cx="80" cy="60" r="4" class="node-outer"/>
  <circle cx="80" cy="60" r="2" class="node-inner"/>

  <circle cx="20" cy="90" r="5" class="node-outer"/>
  <circle cx="20" cy="90" r="2.5" class="node-inner"/>

  <circle cx="40" cy="90" r="4" class="node-outer"/>
  <circle cx="40" cy="90" r="2" class="node-inner"/>

  <circle cx="60" cy="90" r="5" class="node-outer"/>
  <circle cx="60" cy="90" r="2.5" class="node-inner"/>

  <circle cx="100" cy="90" r="5" class="node-outer"/>
  <circle cx="100" cy="90" r="2.5" class="node-inner"/>
</svg>
