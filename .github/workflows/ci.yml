name: CI

on:
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck · Lint · Test · Build · E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Generate React Router types
        run: npx react-router typegen

      - name: Generate Wrangler types
        run: npx wrangler types

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit & component tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Write E2E environment vars
        run: |
          cat > .dev.vars <<'EOF'
          TURNSTILE_SECRET_KEY=1x0000000000000000000000000000000AA
          ADMIN_PASSWORD=test-admin-password
          SESSION_SECRET=test-session-secret-do-not-use-in-production
          EOF

      - name: Initialise local D1 schema
        run: npm run db:migrate:apply:local

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
